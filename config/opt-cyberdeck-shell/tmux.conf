# Minimal tmux — invisible, only used for F-key app switching
set -g status off
set -g prefix None
set -g mouse on
set -g history-limit 5000

# Register fbterm F-key escape sequences as user-keys
set -s user-keys[0] "\e\[\[A"
set -s user-keys[1] "\e\[\[B"
set -s user-keys[2] "\e\[\[C"
set -s user-keys[3] "\e\[\[D"
set -s user-keys[4] "\e\[\[E"
set -s user-keys[5] "\e\[17\~"
set -s user-keys[6] "\e\[18\~"

# Also register xterm-style sequences just in case
set -s user-keys[7] "\e\[11\~"
set -s user-keys[8] "\e\[12\~"
set -s user-keys[9] "\e\[13\~"
set -s user-keys[10] "\e\[14\~"
set -s user-keys[11] "\e\[15\~"
set -s user-keys[12] "\e\[17\~"
set -s user-keys[13] "\e\[18\~"

# Bind user-keys to app switching
bind -n User0 run-shell -b 'python3 /opt/cyberdeck-shell/cyberdeck_switch.py term   >/dev/null 2>&1'
bind -n User1 run-shell -b 'python3 /opt/cyberdeck-shell/cyberdeck_switch.py chat   >/dev/null 2>&1'
bind -n User2 run-shell -b 'python3 /opt/cyberdeck-shell/cyberdeck_switch.py pet    >/dev/null 2>&1'
bind -n User3 run-shell -b 'python3 /opt/cyberdeck-shell/cyberdeck_switch.py reader >/dev/null 2>&1'
bind -n User4 run-shell -b 'python3 /opt/cyberdeck-shell/cyberdeck_switch.py dash   >/dev/null 2>&1'
bind -n User5 run-shell -b 'python3 /opt/cyberdeck-shell/cyberdeck_switch.py wifi   >/dev/null 2>&1'
bind -n User6 run-shell -b 'python3 /opt/cyberdeck-shell/cyberdeck_switch.py bt     >/dev/null 2>&1'

# Also bind standard F-keys for terminals that send them
bind -n F1 run-shell -b 'python3 /opt/cyberdeck-shell/cyberdeck_switch.py term   >/dev/null 2>&1'
bind -n F2 run-shell -b 'python3 /opt/cyberdeck-shell/cyberdeck_switch.py chat   >/dev/null 2>&1'
bind -n F3 run-shell -b 'python3 /opt/cyberdeck-shell/cyberdeck_switch.py pet    >/dev/null 2>&1'
bind -n F4 run-shell -b 'python3 /opt/cyberdeck-shell/cyberdeck_switch.py reader >/dev/null 2>&1'
bind -n F5 run-shell -b 'python3 /opt/cyberdeck-shell/cyberdeck_switch.py dash   >/dev/null 2>&1'
bind -n F6 run-shell -b 'python3 /opt/cyberdeck-shell/cyberdeck_switch.py wifi   >/dev/null 2>&1'
bind -n F7 run-shell -b 'python3 /opt/cyberdeck-shell/cyberdeck_switch.py bt     >/dev/null 2>&1'
