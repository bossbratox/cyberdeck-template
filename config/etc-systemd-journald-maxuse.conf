# Deploy to: edit /etc/systemd/journald.conf on Pi
#
# Add or update the SystemMaxUse line under the [Journal] section.
# The [Journal] section header is already present in the default journald.conf;
# just uncomment or add the line below it.
#
# CRITICAL — set this BEFORE installing Log2Ram:
#   Log2Ram mounts /var/log as a 40MB RAM tmpfs at boot.
#   If /var/log already exceeds 40MB when Log2Ram first starts, it fails
#   silently — /var/log stays on SD, no RAM backing, no error message.
#   The journald cap prevents this. Set it first, vacuum old logs, then install.
#   (Source: github.com/azlux/log2ram README — known pitfall D-06/D-07)
#
# After deploying:
#   sudo journalctl --vacuum-size=32M
#   sudo systemctl restart systemd-journald
#
# Verify journal is under cap:
#   journalctl --disk-usage
#   -> Archived and active journals take up X.XM in the filesystem.
#   -> Should show well under 20M after vacuum.
#
# Also verify /var/log total is under 40MB before installing Log2Ram:
#   du -sh /var/log
#   -> Should be well under 40M.
#
# Why 20M cap:
#   Log2Ram allocates 40MB for all of /var/log (not just journald).
#   Other services write to /var/log too (syslog, auth.log, etc.).
#   Capping journald at 20M leaves 20M headroom for everything else.

[Journal]
SystemMaxUse=20M
