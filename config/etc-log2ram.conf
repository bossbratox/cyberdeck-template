# Deploy to: /etc/log2ram.conf on Pi (installed by log2ram package)
#
# log2ram is installed via the azlux apt repo. The package creates /etc/log2ram.conf
# automatically. Copy the content below into that file (overwrite defaults).
#
# What Log2Ram does:
#   Mounts /var/log as a tmpfs (RAM filesystem) at boot. All log writes go to RAM,
#   not the SD card. A daily systemd timer (log2ram-daily.timer) syncs logs back to
#   SD for durability. On shutdown/reboot, Log2Ram syncs logs before unmounting.
#   This dramatically reduces SD card write amplification from logging activity.
#
# Verify Log2Ram is running after install + reboot:
#   df -h | grep log2ram
#   -> log2ram  40M  ...  /var/log
#   mount | grep log2ram
#   -> log2ram on /var/log type tmpfs (rw,...,size=40960k,...)
#   systemctl is-active log2ram
#   -> active
#
# Manual sync (safe to run any time):
#   sudo log2ram write
#
# Configuration notes:
#   SIZE=40M    — RAM allocation for /var/log. 40MB on a 512MB system leaves
#                 ~369MB for OS + services. Default in log2ram 1.7.x is 40M.
#                 journald is capped at 20M (see etc-systemd-journald-maxuse.conf)
#                 so there is headroom for other logs.
#   MAIL=false  — Disables email alerts on log sync failure. No MTA on this device.
#   ZL2R=false  — Disables zram compression for the log tmpfs. lz4 is used instead
#                 via COMP_ALG below, which is more efficient.
#   COMP_ALG=lz4 — Compression algorithm for the RAM-to-disk sync. lz4 is fast
#                  and has low CPU overhead — correct choice for Pi 3A+.
#   LOG_DISK_SIZE=100M — Max size of the compressed log archive on SD. Keeps
#                        disk logs from growing unbounded between syncs.

SIZE=40M
MAIL=false
PATH_DISK="/var/log"
ZL2R=false
COMP_ALG=lz4
LOG_DISK_SIZE=100M
