# Deploy to: /etc/NetworkManager/conf.d/wifi-powersave.conf on Pi
#
# After deploying, restart NetworkManager:
#   sudo systemctl restart NetworkManager
#
# Verify WiFi power save is off:
#   iw wlan0 get power_save
#   -> should output: Power save: off
#
# Why this config exists:
#   Pi OS Bookworm enables WiFi power management by default. This causes
#   the WiFi radio to sleep between packets, which causes random SSH
#   disconnects during idle sessions. Unacceptable for a SSH maintenance tool.
#
# Value semantics (counterintuitive — read carefully):
#   wifi.powersave = 2  = DISABLE power save (radio stays active, SSH stable)
#   wifi.powersave = 3  = ENABLE power save (radio sleeps, random disconnects)
#   wifi.powersave = 0  = use NetworkManager default (usually 3 on Pi OS)
#
# This build uses value 2 — SSH stability > battery saving on WiFi.
# The battery saving from WiFi power management is minimal compared to
# the reliability cost of random SSH disconnects.
#
# Do NOT use `iwconfig wlan0 power off` instead of this file.
# On Bookworm, NetworkManager owns the WiFi interface. iwconfig fights NM
# and loses on reconnect or NM restart. The conf.d method is persistent.

[connection]
wifi.powersave = 2
