# Deploy to: /etc/overlayroot.local.conf on Pi
#
# Install overlayroot first:
#   sudo apt install overlayroot
#
# Then copy this file:
#   sudo cp config/etc-overlayroot-local.conf /etc/overlayroot.local.conf
#
# Then regenerate initramfs:
#   sudo update-initramfs -u
#
# What this does:
#   Enables overlayFS on the root (ext4) partition via initramfs.
#   Root becomes read-only with a tmpfs upper layer for runtime writes.
#   /boot/firmware (FAT32) stays writable (recurse=0 prevents recursive overlay).
#
# Per D-01: Uses apt overlayroot package, NOT raspi-config (Bookworm bug #137).
# Per D-02: Overlay covers ext4 root only. /boot/firmware stays writable.
#
# To disable for updates (per D-05 cyberdeck-update workflow):
#   echo 'overlayroot=disabled' | sudo tee /etc/overlayroot.local.conf
#   sudo reboot
#
# To re-enable after updates:
#   echo 'overlayroot="tmpfs:recurse=0"' | sudo tee /etc/overlayroot.local.conf
#   sudo reboot
#
# CRITICAL: recurse=0 is MANDATORY. Without it, Bookworm bug #137 makes
# /boot/firmware read-only, breaking the Phase 2 persistent-state restore.

overlayroot="tmpfs:recurse=0"
