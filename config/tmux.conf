# Minimal tmux — used for F-key app switching + top status bar
set -g prefix None
set -g mouse on
set -g history-limit 5000

# Status bar (top): clock + battery on the right via shared lib.
# Refreshes every 15s — battery cache is 30s so reads are cheap.
set -g status on
set -g status-position top
set -g status-interval 15
set -g status-style "fg=white,bg=default"
set -g status-left ""
set -g status-left-length 0
set -g status-right "#(PYTHONPATH=/opt/cyberdeck-shared python3 -m cyberdeck_status)"
set -g status-right-length 40
set -g window-status-format ""
set -g window-status-current-format ""

# F-key app switching
bind -n F1 run-shell -b 'python3 /opt/cyberdeck-shell/cyberdeck_switch.py term   >/dev/null 2>&1'
bind -n F2 run-shell -b 'python3 /opt/cyberdeck-shell/cyberdeck_switch.py chat   >/dev/null 2>&1'
bind -n F3 run-shell -b 'python3 /opt/cyberdeck-shell/cyberdeck_switch.py pet    >/dev/null 2>&1'
bind -n F4 run-shell -b 'python3 /opt/cyberdeck-shell/cyberdeck_switch.py reader >/dev/null 2>&1'
bind -n F5 run-shell -b 'python3 /opt/cyberdeck-shell/cyberdeck_switch.py dash   >/dev/null 2>&1'
bind -n F6 run-shell -b 'python3 /opt/cyberdeck-shell/cyberdeck_switch.py wifi   >/dev/null 2>&1'
bind -n F7 run-shell -b 'python3 /opt/cyberdeck-shell/cyberdeck_switch.py bt     >/dev/null 2>&1'
