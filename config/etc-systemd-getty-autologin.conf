# Auto-login systemd drop-in for getty@tty1
#
# Deploy to: /etc/systemd/system/getty@tty1.service.d/autologin.conf
#
# Steps:
#   sudo mkdir -p /etc/systemd/system/getty@tty1.service.d/
#   sudo cp autologin.conf /etc/systemd/system/getty@tty1.service.d/autologin.conf
#   sudo systemctl daemon-reload
#
# IMPORTANT: The empty ExecStart= line is REQUIRED. It clears the default
# ExecStart before the override takes effect. Without it, systemd appends
# instead of replaces, and you get two agetty processes fighting each other.
#
# WARNING: Replace <YOUR_USER> below with the actual username created during Pi OS flash.
#
# Do NOT mask or delete userconfig.service — let it complete normally.
# Masking it can cause a blank screen on boot. The drop-in approach handles
# the interaction correctly: userconfig.service runs to completion, then
# getty picks up auto-login.

[Service]
ExecStart=
ExecStart=-/sbin/agetty --autologin <YOUR_USER> --noclear %I xterm-256color
